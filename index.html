<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rippit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0f;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.05) 0%, transparent 50%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            padding: 56px 52px;
            border-radius: 28px;
            width: 520px;
            text-align: center;
            backdrop-filter: blur(40px);
            animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* HEADLINE */
        h1 {
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.01em;
            color: rgba(255,255,255,0.35);
            margin-bottom: 36px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* PLATFORMS */
        .platforms {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .platform {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .platform:hover { opacity: 0.9; }

        .platform svg {
            width: 24px;
            height: 24px;
        }

        .platform span {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.05em;
        }

        .platform-more {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
        }

        /* DIVIDER */
        .divider {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.07);
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: white;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.25s ease;
            outline: none;
            margin-bottom: 12px;
        }

        input::placeholder { color: rgba(255,255,255,0.18); }

        input:focus {
            border-color: rgba(99,102,241,0.4);
            background: rgba(99,102,241,0.04);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }

        button::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        button:hover::after { opacity: 1; }
        button:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
        button:active { transform: translateY(0); }

        button.loading {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* STATUS */
        #status {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255,255,255,0.25);
            min-height: 18px;
            transition: all 0.3s ease;
        }

        #status.success { color: #34d399; }
        #status.error { color: #f87171; }
    </style>
</head>
<body>
    <div class="container">

        <div class="logo-wrap">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span class="logo-text">Rippit</span>
        </div>

        <h1>Descargá cualquier video al instante</h1>

        <div class="platforms">
            <!-- YouTube -->
            <div class="platform">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" fill="#FF0000"/>
                    <path d="M9.75 15.02V8.98L15.5 12l-5.75 3.02z" fill="white"/>
                </svg>
                <span>YouTube</span>
            </div>

            <div class="divider"></div>

            <!-- TikTok -->
            <div class="platform">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/>
                </svg>
                <span>TikTok</span>
            </div>

            <div class="divider"></div>

            <!-- Instagram -->
            <div class="platform">
                <svg viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="ig" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#f09433"/>
                            <stop offset="25%" style="stop-color:#e6683c"/>
                            <stop offset="50%" style="stop-color:#dc2743"/>
                            <stop offset="75%" style="stop-color:#cc2366"/>
                            <stop offset="100%" style="stop-color:#bc1888"/>
                        </linearGradient>
                    </defs>
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="url(#ig)"/>
                    <circle cx="12" cy="12" r="4" stroke="white" stroke-width="1.5" fill="none"/>
                    <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
                </svg>
                <span>Instagram</span>
            </div>

            <div class="divider"></div>

            <!-- X/Twitter -->
            <div class="platform">
                <svg viewBox="0 0 24 24" fill="white">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.736-8.858L2.25 2.25H8.08l4.261 5.636zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                <span>Twitter</span>
            </div>

            <div class="divider"></div>

            <span class="platform-more">+1000 más</span>
        </div>

        <input type="text" id="urlInput" placeholder="Pegá el link acá..." />
        <button id="btn" onclick="descargar()">Descargar</button>
        <div id="status"></div>
    </div>

    <script>
        async function descargar() {
            var url = document.getElementById("urlInput").value;
            var status = document.getElementById("status");
            var btn = document.getElementById("btn");

            if (!url) {
                status.textContent = "Pegá una URL primero.";
                status.className = "error";
                return;
            }

            btn.textContent = "Descargando...";
            btn.classList.add("loading");
            btn.disabled = true;
            status.textContent = "Procesando el video, un momento...";
            status.className = "";

            try {
                var response = await fetch("http://127.0.0.1:8000/download", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) throw new Error("Error");

                var blob = await response.blob();
                var a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "video.mp4";
                a.click();

                status.textContent = "✓ Descarga completa";
                status.className = "success";
            } catch(err) {
                status.textContent = "Algo salió mal. Revisá la URL e intentá de nuevo.";
                status.className = "error";
            } finally {
                btn.textContent = "Descargar";
                btn.classList.remove("loading");
                btn.disabled = false;
            }
        }

        document.getElementById("urlInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") descargar();
        });
    </script>
</body>
</html>
